<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캘린더 - Toti</title>
  <link rel="manifest" href="/static/manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
    :root {
      --tomato: #e53935; --tomato-light: #ef9a9a; --tomato-pale: #fff8f7;
      --bg: #fff3f0; --card: #ffffff; --text: #2d2d2d; --text-sub: #888;
      --border: #f5c6c0; --shadow: rgba(229,57,53,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Nunito, sans-serif; background: var(--bg); min-height: 100vh; padding: 24px 16px; color: var(--text); }
    .page-wrap { max-width: 480px; margin: 0 auto; }
    .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .back-btn { background: none; border: none; font-size: 1.3em; cursor: pointer; color: var(--tomato); }
    h1 { font-size: 1.3em; font-weight: 800; color: var(--tomato); }
    .card { background: var(--card); border-radius: 18px; box-shadow: 0 4px 16px var(--shadow); padding: 20px; margin-bottom: 16px; }
    /* 달력 헤더 */
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-nav button { background: none; border: none; font-size: 1.2em; cursor: pointer; color: var(--tomato); padding: 4px 8px; border-radius: 8px; }
    .cal-nav button:hover { background: var(--tomato-pale); }
    .cal-title { font-weight: 800; font-size: 1.05em; }
    /* 달력 그리드 */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-size: 0.7em; color: var(--text-sub); padding-bottom: 6px; font-weight: 700; }
    .cal-cell {
      aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; font-size: 0.85em; cursor: pointer;
      border: 1.5px solid transparent; transition: border-color .15s;
      position: relative; gap: 2px;
    }
    .cal-cell:hover { border-color: var(--tomato-light); }
    .cal-cell.today { font-weight: 800; border-color: var(--tomato); }
    .cal-cell.achieved { background: #e8f5e9; }
    .cal-cell.not-achieved { background: #ffebee; }
    .cal-cell.no-record { background: #fafafa; }
    .cal-cell.future { background: transparent; color: #ccc; cursor: default; }
    .cal-cell.empty { background: transparent; cursor: default; }
    .cal-cell.selected { border-color: var(--tomato) !important; box-shadow: 0 0 0 2px var(--tomato-light); }
    .todo-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--tomato); }
    /* 범례 */
    .legend { display: flex; gap: 12px; font-size: 0.72em; color: var(--text-sub); margin-top: 10px; flex-wrap: wrap; }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    /* 날짜 상세 패널 */
    .detail-card { display: none; }
    .detail-date { font-weight: 800; font-size: 1em; margin-bottom: 12px; color: var(--tomato); }
    .todo-list { list-style: none; padding: 0; margin-bottom: 12px; }
    .todo-list li { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.9em; }
    .todo-list li:last-child { border-bottom: none; }
    .todo-list input[type=checkbox] { accent-color: var(--tomato); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
    .todo-list .del-btn { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 1em; margin-left: auto; }
    .todo-list .done-text { text-decoration: line-through; color: var(--text-sub); }
    .add-row { display: flex; gap: 8px; }
    .add-row input { flex: 1; padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.9em; font-family: Nunito, sans-serif; background: var(--tomato-pale); }
    .add-row button { padding: 7px 14px; background: var(--tomato); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; }
    .empty-msg { color: var(--text-sub); font-size: 0.85em; padding: 8px 0; }
  </style>
</head>
<body>
<div class="page-wrap">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1>학습 캘린더</h1>
  </div>

  <div class="card">
    <div class="cal-nav">
      <button id="prev-btn">&#8592;</button>
      <span class="cal-title" id="cal-title"></span>
      <button id="next-btn">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="legend" style="margin-top:12px;">
      <span><div class="dot" style="background:#e8f5e9;border:1px solid #a5d6a7;"></div> 목표 달성</span>
      <span><div class="dot" style="background:#ffebee;border:1px solid #ef9a9a;"></div> 미달성</span>
      <span><div class="dot" style="background:#fafafa;border:1px solid #eee;"></div> 기록 없음</span>
      <span><div class="dot" style="background:white;border:1.5px solid var(--tomato);"></div> 오늘</span>
    </div>
  </div>

  <div class="card detail-card" id="detail-card">
    <div class="detail-date" id="detail-date"></div>
    <ul class="todo-list" id="todo-list"><li class="empty-msg">할 일이 없습니다.</li></ul>
    <div class="add-row">
      <input type="text" id="todo-input" placeholder="할 일 추가..." maxlength="80">
      <button id="todo-add-btn">+</button>
    </div>
  </div>
</div>

<script>
  const TODAY = new Date().toISOString().slice(0, 10);
  let curYear = parseInt(TODAY.slice(0, 4));
  let curMonth = parseInt(TODAY.slice(5, 7));
  let selectedDate = null;
  let achieveData = {};

  // ===== 인증 유틸 =====
  async function tryRefresh() {
    const rt = localStorage.getItem("refresh_token");
    if (!rt) return false;
    try {
      const res = await fetch("/users/refresh", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ refresh_token: rt })
      });
      if (!res.ok) { localStorage.removeItem("access_token"); localStorage.removeItem("refresh_token"); return false; }
      localStorage.setItem("access_token", (await res.json()).access_token);
      return true;
    } catch { return false; }
  }

  async function authFetch(url, options = {}) {
    const token = localStorage.getItem("access_token");
    const headers = { ...(options.headers || {}), "Authorization": `Bearer ${token}` };
    let res = await fetch(url, { ...options, headers });
    if (res.status === 401) {
      if (await tryRefresh()) {
        const h2 = { ...(options.headers || {}), "Authorization": `Bearer ${localStorage.getItem("access_token")}` };
        res = await fetch(url, { ...options, headers: h2 });
      } else {
        alert("로그인이 필요합니다."); window.location.href = "/users/login-page";
      }
    }
    return res;
  }

  // ===== 달력 렌더링 =====
  async function loadCalendar(year, month) {
    document.getElementById("cal-title").textContent = `${year}년 ${month}월`;
    try {
      const res = await authFetch(`/stats/achievement?year=${year}&month=${month}`);
      achieveData = res.ok ? await res.json() : {};
    } catch { achieveData = {}; }

    const DAYS = ["일","월","화","수","목","금","토"];
    const firstDow = new Date(year, month - 1, 1).getDay();
    const daysInMonth = new Date(year, month, 0).getDate();
    const grid = document.getElementById("cal-grid");
    grid.innerHTML = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join("");

    for (let i = 0; i < firstDow; i++) grid.innerHTML += `<div class="cal-cell empty"></div>`;

    for (let day = 1; day <= daysInMonth; day++) {
      const ds = `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
      let cls = "no-record";
      if (ds > TODAY) cls = "future";
      else if (ds in achieveData) cls = achieveData[ds] ? "achieved" : "not-achieved";
      if (ds === TODAY) cls += " today";
      if (ds === selectedDate) cls += " selected";

      const cell = document.createElement("div");
      cell.className = `cal-cell ${cls}`;
      cell.innerHTML = `<span>${day}</span>`;
      if (ds <= TODAY && ds in achieveData) cell.innerHTML += `<div class="todo-dot"></div>`;
      if (ds <= TODAY) cell.addEventListener("click", () => openDetail(ds));
      grid.appendChild(cell);
    }
  }

  // ===== 날짜 상세 =====
  async function openDetail(dateStr) {
    selectedDate = dateStr;
    document.getElementById("detail-date").textContent = dateStr.replace(/-/g, ". ") + " 할 일";
    document.getElementById("detail-card").style.display = "block";
    await loadTodos(dateStr);
    // 선택 상태 반영
    document.querySelectorAll(".cal-cell.selected").forEach(c => c.classList.remove("selected"));
    const dayNum = parseInt(dateStr.slice(8));
    const cells = document.querySelectorAll(".cal-cell:not(.empty)");
    const firstDow = new Date(curYear, curMonth - 1, 1).getDay();
    const targetIdx = firstDow + dayNum - 1;
    const allCells = document.querySelectorAll(".cal-cell");
    if (allCells[targetIdx]) allCells[targetIdx].classList.add("selected");
  }

  async function loadTodos(dateStr) {
    const list = document.getElementById("todo-list");
    list.innerHTML = "";
    try {
      const res = await authFetch(`/timer/api/todos?target_date=${dateStr}`);
      const todos = await res.json();
      if (todos.length === 0) {
        list.innerHTML = `<li class="empty-msg">할 일이 없습니다.</li>`;
        return;
      }
      todos.forEach(t => appendTodoItem(t, dateStr));
    } catch { list.innerHTML = `<li class="empty-msg">불러오기 실패</li>`; }
  }

  function appendTodoItem(t, dateStr) {
    const list = document.getElementById("todo-list");
    const emptyMsg = list.querySelector(".empty-msg");
    if (emptyMsg) emptyMsg.remove();

    const li = document.createElement("li");
    li.dataset.id = t.id;
    li.innerHTML = `
      <input type="checkbox" ${t.is_completed ? "checked" : ""}>
      <span class="${t.is_completed ? "done-text" : ""}">${t.content}</span>
      <button class="del-btn">✕</button>
    `;
    li.querySelector("input").addEventListener("change", async (e) => {
      await authFetch(`/timer/api/todos/${t.id}`, {
        method: "PUT", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ is_completed: e.target.checked })
      });
      li.querySelector("span").className = e.target.checked ? "done-text" : "";
    });
    li.querySelector(".del-btn").addEventListener("click", async () => {
      await authFetch(`/timer/api/todos/${t.id}`, { method: "DELETE" });
      li.remove();
      if (!list.querySelector("li:not(.empty-msg)")) {
        list.innerHTML = `<li class="empty-msg">할 일이 없습니다.</li>`;
      }
    });
    list.appendChild(li);
  }

  document.getElementById("todo-add-btn").addEventListener("click", async () => {
    if (!selectedDate) return;
    const input = document.getElementById("todo-input");
    const content = input.value.trim();
    if (!content) return;
    try {
      const res = await authFetch("/timer/api/todos", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ content, target_date: selectedDate })
      });
      appendTodoItem(await res.json(), selectedDate);
      input.value = "";
    } catch { alert("추가 실패"); }
  });

  document.getElementById("todo-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("todo-add-btn").click();
  });

  // ===== 월 이동 =====
  document.getElementById("prev-btn").addEventListener("click", () => {
    curMonth--; if (curMonth < 1) { curMonth = 12; curYear--; }
    loadCalendar(curYear, curMonth);
  });
  document.getElementById("next-btn").addEventListener("click", () => {
    curMonth++; if (curMonth > 12) { curMonth = 1; curYear++; }
    loadCalendar(curYear, curMonth);
  });

  // ===== 초기화 =====
  const token = localStorage.getItem("access_token");
  if (!token) { window.location.href = "/users/login-page"; }
  else { loadCalendar(curYear, curMonth); }
</script>
</body>
</html>
